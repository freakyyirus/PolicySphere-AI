version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-policysphere-secret-key-change-in-production}
      - JWT_EXPIRES_IN=24h
      - FRONTEND_URL=http://localhost:80
      - LOG_LEVEL=info
    volumes:
      - ./backend/prisma:/app/prisma
    restart: unless-stopped
    networks:
      - policysphere

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - policysphere

networks:
  policysphere:
    driver: bridge